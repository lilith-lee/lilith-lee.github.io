<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✧ 麓の夢幻小窩 ✧ 千禧樂園</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #fff0f5 0%, #e8f4ff 50%, #fff9e6 100%);
      background-image: 
        radial-gradient(circle at 15% 25%, #ffb3d9 2px, transparent 2px),
        radial-gradient(circle at 85% 15%, #ffe066 3px, transparent 3px),
        radial-gradient(circle at 75% 85%, #b3e0ff 2.5px, transparent 2.5px),
        radial-gradient(circle at 25% 75%, #d9b3ff 3px, transparent 3px),
        radial-gradient(circle at 50% 50%, #ffccdd 2px, transparent 2px);
      background-size: 180px 180px, 200px 200px, 220px 220px, 160px 160px, 250px 250px;
      min-height: 100vh;
      padding: 24px 16px;
      font-family: 'Comic Sans MS', 'Chalkboard SE', '幼圆', 'Segoe UI', cursive, sans-serif;
      color: #5a3a6e;
      position: relative;
    }

    body::before {
      content: "🧸🎀🍀☘️⭐✨💗🦋";
      position: fixed;
      bottom: 10px;
      left: 10px;
      font-size: 24px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 1;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cpath fill=\'%23ffd4e8\' d=\'M10 10 L13 16 L19 19 L13 22 L10 28 L7 22 L1 19 L7 16z\'/%3E%3C/svg%3E');
      background-repeat: repeat;
      pointer-events: none;
      z-index: 1;
      opacity: 0.2;
    }

    .dream-container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 250, 240, 0.75);
      backdrop-filter: blur(12px);
      border: 5px ridge #ffb6d9;
      border-radius: 50px 20px 50px 20px;
      box-shadow: 0 0 40px #ffb3d9, 0 0 20px #b3e0ff inset, 0 8px 0 #d4a0c0;
      padding: 28px 24px;
      position: relative;
      z-index: 10;
    }

    .loading-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 240, 245, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-size: 24px;
      color: #7a4a6e;
      backdrop-filter: blur(5px);
    }

    .loading-overlay.hide {
      display: none;
    }

    .sync-status {
      background: rgba(255, 220, 240, 0.6);
      border: 2px solid #ffb6c1;
      border-radius: 40px;
      padding: 5px 15px;
      margin-bottom: 15px;
      display: inline-block;
      font-size: 0.8rem;
      color: #7a6a7e;
    }

    .login-bar {
      background: rgba(255, 220, 240, 0.6);
      border: 2px solid #ffb6c1;
      border-radius: 40px;
      padding: 8px 18px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(5px);
    }

    .login-status {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .crown-icon {
      font-size: 22px;
      filter: drop-shadow(0 0 5px #ffd700);
    }

    .login-btn, .logout-btn {
      background: #ffb6d9;
      border: 2px outset #ffe0f0;
      color: #6b3a5a;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 0 #d491b0;
      transition: 0.1s;
    }

    .login-btn:hover, .logout-btn:hover {
      background: #ffc4e0;
      transform: scale(0.98);
    }

    .password-input {
      background: #fff5fb;
      border: 2px solid #ffb6d9;
      border-radius: 30px;
      padding: 6px 12px;
      font-family: 'Comic Sans MS', cursive;
      outline: none;
      color: #5a3a6e;
    }

    .control-panel {
      background: rgba(255, 235, 215, 0.7);
      border: 2px solid #ffd4a0;
      border-radius: 20px;
      padding: 10px 15px;
      margin-bottom: 20px;
      display: none;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      backdrop-filter: blur(5px);
    }

    .control-panel.show {
      display: flex;
    }

    .control-btn {
      background: #ffe0b3;
      border: 2px outset #ffd4a0;
      color: #6b4a3a;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 0 #d4a070;
    }

    .control-btn.highlight {
      background: #ffb347;
      color: white;
      border-color: #ffe0b3;
    }

    .avatar-library {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff5e6;
      border: 5px ridge #ffb6d9;
      border-radius: 30px;
      padding: 24px;
      z-index: 1000;
      display: none;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 0 50px #ffb3d9;
    }

    .avatar-library.show {
      display: block;
    }

    .avatar-library h3 {
      color: #7a4a6e;
      text-align: center;
      margin-bottom: 15px;
    }

    .avatar-tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
    }

    .avatar-tab {
      flex: 1;
      padding: 8px;
      background: #ffe0f0;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      color: #7a4a6e;
    }

    .avatar-tab.active {
      background: #ffb6d9;
      color: white;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 20px 0;
      max-height: 300px;
      overflow-y: auto;
    }

    .avatar-option {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid #ffd4e8;
      cursor: pointer;
      background: #fff0f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      transition: 0.2s;
    }

    .avatar-option:hover {
      transform: scale(1.1);
      border-color: #ff99cc;
      box-shadow: 0 0 15px #ffb6d9;
    }

    .upload-area {
      text-align: center;
      padding: 20px;
    }

    .upload-btn {
      background: #ffb6d9;
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0;
    }

    .close-library {
      background: #c4a0b0;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 220, 240, 0.5);
      backdrop-filter: blur(3px);
      z-index: 999;
      display: none;
    }

    .overlay.show {
      display: block;
    }

    .guest-notice {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff0e0;
      border: 3px solid #ffb6d9;
      border-radius: 50px;
      padding: 12px 24px;
      z-index: 900;
      box-shadow: 0 5px 20px rgba(255, 180, 200, 0.5);
      display: none;
      align-items: center;
      gap: 15px;
      color: #7a4a6e;
      font-weight: bold;
    }

    .guest-notice.show {
      display: flex;
    }

    .guest-notice button {
      background: #ffb6d9;
      border: none;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      cursor: pointer;
    }

    [contenteditable="true"]:hover {
      background: rgba(255, 200, 220, 0.2);
      outline: 2px dashed #ffb6d9;
      border-radius: 8px;
    }

    .bow-deco, .heart-corner, .floating-deco {
      pointer-events: none;
      position: absolute;
      z-index: 20;
    }
    .bow-deco { top: -12px; right: 30px; font-size: 36px; filter: drop-shadow(0 0 8px #ffb6d9); }
    .heart-corner { bottom: -8px; left: 20px; font-size: 30px; filter: drop-shadow(0 0 8px #ffb6d9); }
    .floating-deco-1 { right: -5px; bottom: 30%; font-size: 28px; opacity: 0.7; }
    .floating-deco-2 { left: 10px; top: 20%; font-size: 24px; opacity: 0.6; }

    .line-girl-decoration {
      display: flex;
      justify-content: space-around;
      margin: 15px 0;
      padding: 5px;
      pointer-events: none;
    }

    .line-girl-svg {
      width: 70px;
      height: 90px;
      filter: drop-shadow(0 0 5px #ffd4e8);
      opacity: 0.7;
    }

    .top-section {
      display: flex;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 20px 30px;
      margin-bottom: 20px;
    }

    .avatar-area {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar-wrapper {
      background: #ffe4f0;
      padding: 10px 10px 6px;
      border-radius: 60% 40% 60% 40% / 50% 50% 40% 40%;
      border: 4mm ridge #ffd4e8;
      box-shadow: 0 0 25px #ffb6d9, inset 0 0 10px #fff0f5;
      cursor: pointer;
    }

    .avatar-img {
      width: 130px;
      height: 130px;
      object-fit: cover;
      background: #fff0f5;
      border-radius: 55% 35% 55% 35% / 45% 45% 35% 55%;
      border: 3px solid #ffffff;
      box-shadow: 0 5px 0 #d491b0, 0 0 20px #ffd4e8;
    }

    .avatar-emoji {
      font-size: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .welcome-neon {
      flex: 1;
      padding: 8px 0;
    }

    .neon-text {
      font-size: 2.8rem;
      font-weight: bold;
      font-family: 'Brush Script MT', 'Comic Sans MS', cursive;
      color: #7a4a6e;
      text-shadow: 0 0 5px #fff9e6, 0 0 15px #ffb6d9, 0 0 25px #ffd4e8, 3px 3px 0 #ffe0f0;
      animation: softGlow 2s infinite alternate;
      outline: none;
    }

    @keyframes softGlow {
      from { text-shadow: 0 0 5px #fff9e6, 0 0 15px #ffb6d9, 0 0 25px #ffd4e8, 3px 3px 0 #ffe0f0; }
      to { text-shadow: 0 0 10px #fff5d0, 0 0 20px #ffc4e0, 0 0 35px #ffe0b3, 3px 3px 0 #ffd4e8; }
    }

    .hand-drawn-divider {
      margin: 15px 0 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .divider-line {
      flex: 1;
      height: 6px;
      background: repeating-linear-gradient(90deg, #ffd4e8, #ffd4e8 8px, transparent 8px, transparent 16px);
      border-radius: 20px;
    }

    .divider-heart {
      font-size: 28px;
      filter: drop-shadow(0 0 8px #ffb6d9);
      animation: heartbeat 1.5s infinite;
    }

    @keyframes heartbeat {
      0%,100%{ transform: scale(1); }
      30%{ transform: scale(1.15); }
    }

    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin: 25px 0 15px;
    }

    .pic-card {
      background: rgba(255, 245, 235, 0.7);
      backdrop-filter: blur(4px);
      border: 3px ridge #ffd4e8;
      border-radius: 30px 8px 30px 8px;
      padding: 16px 12px;
      box-shadow: 0 6px 0 #d4b0c0, 0 0 20px #ffe0f0;
    }

    .pic-frame {
      background: #fff0e6;
      padding: 8px;
      border-radius: 20px 4px 20px 4px;
      border: 2px dashed #ffd4e8;
      margin-bottom: 12px;
    }

    .vintage-pic {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 20px 4px 20px 4px;
      border: 3px solid #fff9e6;
      box-shadow: 0 0 15px #ffd4e8;
      background: #ffe4d0;
    }

    .editable-box {
      background: rgba(255, 250, 240, 0.6);
      border: 2px inset #ffd4e8;
      border-radius: 20px 4px 20px 4px;
      padding: 8px;
    }

    .editable-text {
      width: 100%;
      min-height: 70px;
      padding: 10px 8px;
      background: #fff9f0;
      border: 2px solid #ffd4e8;
      border-radius: 14px 2px 14px 2px;
      font-family: 'Comic Sans MS', '幼圆', sans-serif;
      color: #6b4a5a;
      font-size: 0.95rem;
      font-weight: 500;
      resize: vertical;
      outline: none;
    }

    .comment-section {
      margin-top: 12px;
      border-top: 2px dotted #ffd4e8;
      padding-top: 10px;
    }

    .comment-list {
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 8px;
      font-size: 0.8rem;
      padding-right: 5px;
    }

    .comment-item {
      background: rgba(255, 245, 240, 0.6);
      padding: 6px 10px;
      border-radius: 15px;
      margin-bottom: 5px;
      color: #6b4a5a;
      display: flex;
      align-items: flex-start;
      gap: 5px;
      flex-wrap: wrap;
    }

    .comment-name {
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .owner-crown {
      font-size: 12px;
      filter: drop-shadow(0 0 3px gold);
    }

    .reply-btn {
      background: none;
      border: 1px solid #ffd4e8;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 0.65rem;
      color: #9a7a8e;
      cursor: pointer;
      margin-left: 8px;
    }

    .reply-btn:hover {
      background: #ffe0f0;
    }

    .comment-input-area {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .comment-name-input {
      width: 75px;
      padding: 5px 8px;
      border-radius: 20px;
      border: 2px solid #ffd4e8;
      background: #fff9f0;
      font-size: 0.75rem;
      color: #6b4a5a;
    }

    .comment-text-input {
      flex: 1;
      padding: 5px 8px;
      border-radius: 20px;
      border: 2px solid #ffd4e8;
      background: #fff9f0;
      font-size: 0.75rem;
      color: #6b4a5a;
    }

    .comment-btn {
      background: #ffd4e8;
      border: none;
      color: #7a4a6e;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.75rem;
      box-shadow: 0 2px 0 #d4a0b0;
    }

    .footer-note {
      margin-top: 30px;
      text-align: right;
      font-size: 1rem;
      border-top: 2px dotted #ffd4e8;
      padding-top: 15px;
      color: #7a5a6e;
    }

    .deco-bear {
      position: absolute;
      font-size: 20px;
      opacity: 0.4;
    }

    .refresh-btn {
      background: #b3e0ff;
      border: 2px outset #d4e8ff;
      color: #5a6a7e;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      margin-left: 10px;
    }

    @media (max-width: 640px) {
      .neon-text { font-size: 2rem; }
      .top-section { flex-direction: column; align-items: center; }
      .welcome-neon { text-align: center; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <span>🧸 載入中... 🎀</span>
</div>

<div class="deco-bear" style="top: 50px; left: 20px;">🧸</div>
<div class="deco-bear" style="bottom: 80px; right: 30px;">🍀</div>
<div class="deco-bear" style="top: 150px; right: 50px;">☘️</div>

<div class="overlay" id="overlay"></div>
<div class="avatar-library" id="avatarLibrary">
  <h3>🎀 選擇妳的頭像 🎀</h3>
  <div class="avatar-tabs">
    <button class="avatar-tab active" onclick="switchAvatarTab('emoji')">😊 Emoji</button>
    <button class="avatar-tab" onclick="switchAvatarTab('upload')">📸 上傳</button>
  </div>
  <div id="emojiTab">
    <div class="avatar-grid" id="avatarGrid"></div>
  </div>
  <div id="uploadTab" style="display:none;">
    <div class="upload-area">
      <p style="color:#7a4a6e;">點擊上傳妳的圖片</p>
      <button class="upload-btn" onclick="document.getElementById('avatarUploadInput').click()">📁 選擇圖片</button>
      <input type="file" id="avatarUploadInput" accept="image/*" style="display:none;" onchange="uploadCustomAvatar(event)">
    </div>
  </div>
  <button class="close-library" onclick="closeAvatarLibrary()">關閉</button>
</div>

<div class="guest-notice" id="guestNotice">
  <span>👋 歡迎來訪！在這裡可以留下妳的評論喔～</span>
  <button onclick="closeGuestNotice()">知道了 ✨</button>
</div>

<div class="dream-container">
  <div class="bow-deco">🎀✨🎀</div>
  <div class="heart-corner">💗💖💗</div>
  <div class="floating-deco-1">🦋⭐</div>
  <div class="floating-deco-2">🧸🍀</div>

  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
    <span class="sync-status" id="syncStatus">☁️ 已連接雲端</span>
    <button class="refresh-btn" onclick="loadAllFromCloud()">🔄 刷新</button>
  </div>

  <div class="login-bar">
    <div class="login-status">
      <span class="crown-icon" id="crownIcon">🧸</span>
      <span id="loginStatusText">訪客模式 · 歡迎來玩</span>
    </div>
    <div id="loginArea">
      <input type="password" id="passwordInput" class="password-input" placeholder="密碼" style="width:80px;">
      <button class="login-btn" onclick="login()">🔐 登入</button>
    </div>
    <div id="logoutArea" style="display:none;">
      <button class="logout-btn" onclick="logout()">👑 退出主人模式</button>
    </div>
  </div>

  <div class="control-panel" id="controlPanel">
    <button class="control-btn highlight" onclick="saveSiteToCloud()">☁️ 同步網站到雲端</button>
    <button class="control-btn" onclick="resetToDefault()">🔄 恢復默認</button>
    <button class="control-btn" onclick="exportConfig()">📥 導出備份</button>
    <button class="control-btn" onclick="importConfig()">📤 導入備份</button>
    <span style="color:#7a6a5e; margin-left:auto;" id="saveIndicator"></span>
  </div>

  <div class="top-section">
    <div class="avatar-area">
      <div class="avatar-wrapper" onclick="handleAvatarClick()">
        <div id="profileAvatar" class="avatar-img avatar-emoji">👧</div>
      </div>
      <div style="margin-top:6px; font-size:0.75rem; color:#9a7a8e;">
        <span id="avatarHint">👆 點擊更換頭像</span>
      </div>
    </div>
    <div class="welcome-neon">
      <div class="neon-text" id="welcomeText" contenteditable="false">Welcome to my world!</div>
      <div style="margin-top:6px; color:#8a6a7e;" id="welcomeSub" contenteditable="false">✧ 啵啵星球 · 永遠歡迎妳 ✧</div>
    </div>
  </div>

  <div class="line-girl-decoration">
    <svg class="line-girl-svg" viewBox="0 0 100 120">
      <circle cx="50" cy="35" r="16" fill="none" stroke="#d4a0b0" stroke-width="2"/>
      <circle cx="43" cy="32" r="2" fill="#d4a0b0"/>
      <circle cx="57" cy="32" r="2" fill="#d4a0b0"/>
      <path d="M45 43 Q50 49,55 43" fill="none" stroke="#d4a0b0" stroke-width="1.8"/>
      <path d="M50 51 L50 75" stroke="#d4a0b0" stroke-width="1.8"/>
      <path d="M35 55 L50 62 L65 55" fill="none" stroke="#d4a0b0" stroke-width="1.8"/>
      <path d="M50 75 L42 95" stroke="#d4a0b0" stroke-width="1.8"/>
      <path d="M50 75 L58 95" stroke="#d4a0b0" stroke-width="1.8"/>
    </svg>
    <svg class="line-girl-svg" viewBox="0 0 100 120">
      <circle cx="50" cy="30" r="18" fill="none" stroke="#c4a0b0" stroke-width="2"/>
      <path d="M40 28 Q45 25,50 28 Q55 25,60 28" fill="none" stroke="#c4a0b0" stroke-width="1.8"/>
      <circle cx="42" cy="28" r="1.8" fill="#c4a0b0"/>
      <circle cx="58" cy="28" r="1.8" fill="#c4a0b0"/>
      <path d="M50 48 L50 78" stroke="#c4a0b0" stroke-width="1.8"/>
      <path d="M50 58 L32 48" stroke="#c4a0b0" stroke-width="1.8"/>
      <path d="M50 58 L68 48" stroke="#c4a0b0" stroke-width="1.8"/>
      <path d="M50 78 L40 100" stroke="#c4a0b0" stroke-width="1.8"/>
      <path d="M50 78 L60 100" stroke="#c4a0b0" stroke-width="1.8"/>
    </svg>
  </div>

  <div class="hand-drawn-divider">
    <span class="divider-heart" id="heartLeft" contenteditable="false">❤️</span>
    <span class="divider-line"></span>
    <span class="divider-heart" id="heartRight" contenteditable="false">💕</span>
  </div>

  <div class="content-grid" id="contentGrid"></div>

  <div class="line-girl-decoration">
    <svg class="line-girl-svg" viewBox="0 0 100 120">
      <circle cx="50" cy="32" r="17" fill="none" stroke="#b4a0c0" stroke-width="2"/>
      <circle cx="44" cy="29" r="2" fill="#b4a0c0"/>
      <circle cx="56" cy="29" r="2" fill="#b4a0c0"/>
      <path d="M46 40 Q50 45,54 40" fill="none" stroke="#b4a0c0" stroke-width="1.5"/>
      <path d="M50 49 L50 70" stroke="#b4a0c0" stroke-width="1.8"/>
      <path d="M50 58 L38 50" stroke="#b4a0c0" stroke-width="1.8"/>
      <path d="M50 58 L62 50" stroke="#b4a0c0" stroke-width="1.8"/>
      <path d="M50 70 L43 92" stroke="#b4a0c0" stroke-width="1.8"/>
      <path d="M50 70 L57 92" stroke="#b4a0c0" stroke-width="1.8"/>
    </svg>
  </div>

  <div class="footer-note">
    <span id="footerLine1" contenteditable="false">🎀 歡迎來到我的小宇宙 🎀</span><br>
    <span style="font-size:0.85rem;" id="footerLine2" contenteditable="false">✧ 留言 · 貼圖 · 愛妳 ✧</span>
  </div>
</div>

<script>
  // ========== 配置 - 请替换成你自己的 ==========
  const JSONBIN_API_KEY = '$2a$10$plHl7lwVtxDRSvcuiLOim.FYzmX7LCoGjktOqbAXH6uLY9fnM/7aq';           // 👈 替换这里！
  const SITE_BIN_ID = '69d65cc7aaba882197d805f3';           // 👈 替换这里！（主人数据）
  const COMMENTS_BIN_ID = '69d6650536566621a88f4399';   // 👈 替换这里！（公开评论）
  
  const SITE_URL = `https://api.jsonbin.io/v3/b/${SITE_BIN_ID}`;
  const COMMENTS_URL = `https://api.jsonbin.io/v3/b/${COMMENTS_BIN_ID}`;
  
  const OWNER_PASSWORD = '123456';
  const OWNER_NAME = '麓';
  
  let isOwner = false;
  let guestName = localStorage.getItem('guestName') || '';
  
  const avatarEmojis = ['👧', '👩', '🧑', '👸', '🐰', '🐱', '🦊', '🐼', '🌸', '⭐', '🌈', '💗', '🎀', '🦋', '✨', '☀️'];
  
  const defaultCards = [
    { pic: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ffe0f0'/%3E%3Ccircle cx='50' cy='40' r='20' fill='%23fff0f5'/%3E%3Cpath d='M30 70 L50 55 L70 70' stroke='%23d491b0' stroke-width='3' fill='none'/%3E%3Ctext x='25' y='90' font-size='14' fill='%23b07090' font-family='Comic Sans MS'%3E✧ 小兔 ✧%3C/text%3E%3C/svg%3E", text: "🌸 今天也是粉紅泡泡的一天！" },
    { pic: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23d4e8ff'/%3E%3Cpath d='M20 40 Q50 10,80 40' stroke='%23ffffff' stroke-width='4' fill='%23ffe6f2'/%3E%3Ccircle cx='35' cy='35' r='6' fill='%23ffe6b3'/%3E%3Ccircle cx='65' cy='35' r='6' fill='%23ffe6b3'/%3E%3Ctext x='30' y='90' font-size='14' fill='%237090b0' font-family='Comic Sans MS'%3E✧ 星星 ✧%3C/text%3E%3C/svg%3E", text: "✨ 閃閃惹人愛 ✨" },
    { pic: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23e8d4ff'/%3E%3Cpath d='M50 20 L60 40 L80 45 L65 60 L70 80 L50 70 L30 80 L35 60 L20 45 L40 40 Z' fill='%23fff0f5'/%3E%3Ctext x='25' y='90' font-size='14' fill='%23a070b0' font-family='Comic Sans MS'%3E✧ 夢幻 ✧%3C/text%3E%3C/svg%3E", text: "🦋 在夢境裡飛行 🦋" }
  ];

  let cardsData = JSON.parse(JSON.stringify(defaultCards));
  let commentsData = [[], [], []];

  // ========== 云端操作 ==========
  async function loadAllFromCloud() {
    showLoading(true);
    try {
      // 并行加载站点数据和评论
      const [siteRes, commentsRes] = await Promise.all([
        fetch(`${SITE_URL}/latest`, { headers: { 'X-Master-Key': JSONBIN_API_KEY } }),
        fetch(`${COMMENTS_URL}/latest`, { headers: { 'X-Master-Key': JSONBIN_API_KEY } })
      ]);
      
      if (siteRes.ok) {
        const siteData = await siteRes.json();
        applySiteData(siteData.record);
        if (siteData.record.cards) cardsData = siteData.record.cards;
      }
      
      if (commentsRes.ok) {
        const commentsResp = await commentsRes.json();
        commentsData = commentsResp.record;
        if (!Array.isArray(commentsData)) commentsData = [[], [], []];
        while (commentsData.length < cardsData.length) commentsData.push([]);
      }
      
      document.getElementById('syncStatus').innerHTML = '☁️ 已同步最新內容';
      renderCards();
      showSaveTip('✨ 已從雲端載入最新內容！');
    } catch (e) {
      console.error('加載失敗', e);
      document.getElementById('syncStatus').innerHTML = '⚠️ 離線模式';
    }
    showLoading(false);
  }

  async function saveSiteToCloud() {
    if (!isOwner) {
      alert('只有主人可以儲存網站內容到雲端喔！👑');
      return;
    }
    
    showLoading(true);
    
    const siteData = collectSiteData();
    siteData.cards = cardsData;
    
    try {
      const response = await fetch(SITE_URL, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify(siteData)
      });
      
      if (response.ok) {
        document.getElementById('syncStatus').innerHTML = '☁️ 網站已同步';
        showSaveTip('✨ 網站內容已同步到雲端！');
      }
    } catch (e) {
      alert('同步失敗，請檢查網絡');
    }
    showLoading(false);
  }

  async function saveCommentsToCloud() {
    try {
      const response = await fetch(COMMENTS_URL, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify(commentsData)
      });
      
      if (response.ok) {
        document.getElementById('syncStatus').innerHTML = '☁️ 評論已同步';
      }
    } catch (e) {
      console.error('評論同步失敗', e);
    }
  }

  function applySiteData(data) {
    if (data.avatar) {
      const avatarEl = document.getElementById('profileAvatar');
      if (data.avatarType === 'emoji') {
        if (avatarEl.tagName === 'IMG') {
          const parent = avatarEl.parentNode;
          const newDiv = document.createElement('div');
          newDiv.id = 'profileAvatar';
          newDiv.className = 'avatar-img avatar-emoji';
          newDiv.innerText = data.avatar;
          parent.replaceChild(newDiv, avatarEl);
        } else {
          avatarEl.innerText = data.avatar;
        }
      } else {
        if (avatarEl.tagName !== 'IMG') {
          const parent = avatarEl.parentNode;
          const img = document.createElement('img');
          img.id = 'profileAvatar';
          img.className = 'avatar-img';
          img.src = data.avatar;
          parent.replaceChild(img, avatarEl);
        } else {
          avatarEl.src = data.avatar;
        }
      }
    }
    if (data.welcomeText) document.getElementById('welcomeText').innerText = data.welcomeText;
    if (data.welcomeSub) document.getElementById('welcomeSub').innerText = data.welcomeSub;
    if (data.heartLeft) document.getElementById('heartLeft').innerText = data.heartLeft;
    if (data.heartRight) document.getElementById('heartRight').innerText = data.heartRight;
    if (data.footerLine1) document.getElementById('footerLine1').innerText = data.footerLine1;
    if (data.footerLine2) document.getElementById('footerLine2').innerText = data.footerLine2;
  }

  function collectSiteData() {
    const avatarEl = document.getElementById('profileAvatar');
    return {
      avatar: avatarEl.tagName === 'IMG' ? avatarEl.src : avatarEl.innerText,
      avatarType: avatarEl.tagName === 'IMG' ? 'image' : 'emoji',
      welcomeText: document.getElementById('welcomeText').innerText,
      welcomeSub: document.getElementById('welcomeSub').innerText,
      heartLeft: document.getElementById('heartLeft').innerText,
      heartRight: document.getElementById('heartRight').innerText,
      footerLine1: document.getElementById('footerLine1').innerText,
      footerLine2: document.getElementById('footerLine2').innerText
    };
  }

  function showLoading(show) {
    document.getElementById('loadingOverlay').classList.toggle('hide', !show);
  }

  // ========== 初始化 ==========
  async function init() {
    initAvatarLibrary();
    await loadAllFromCloud();
    updateOwnerUI();
    
    // 每15秒自动刷新评论
    setInterval(async () => {
      try {
        const res = await fetch(`${COMMENTS_URL}/latest`, { 
          headers: { 'X-Master-Key': JSONBIN_API_KEY } 
        });
        if (res.ok) {
          const data = await res.json();
          commentsData = data.record;
          renderCards();
        }
      } catch (e) {}
    }, 15000);
    
    if (!isOwner && !localStorage.getItem('guestNoticeShown')) {
      setTimeout(() => {
        document.getElementById('guestNotice').classList.add('show');
        localStorage.setItem('guestNoticeShown', 'true');
      }, 500);
    }
    
    if (guestName) {
      setTimeout(() => {
        document.querySelectorAll('.comment-name-input').forEach(input => {
          if (!input.value) input.value = guestName;
        });
      }, 100);
    }
  }

  function closeGuestNotice() {
    document.getElementById('guestNotice').classList.remove('show');
  }

  function initAvatarLibrary() {
    const grid = document.getElementById('avatarGrid');
    grid.innerHTML = '';
    avatarEmojis.forEach(emoji => {
      const div = document.createElement('div');
      div.className = 'avatar-option';
      div.innerText = emoji;
      div.onclick = () => selectAvatar(emoji);
      grid.appendChild(div);
    });
  }

  function switchAvatarTab(tab) {
    document.querySelectorAll('.avatar-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('emojiTab').style.display = tab === 'emoji' ? 'block' : 'none';
    document.getElementById('uploadTab').style.display = tab === 'upload' ? 'block' : 'none';
  }

  function selectAvatar(avatar) {
    const avatarEl = document.getElementById('profileAvatar');
    if (avatarEl.tagName === 'IMG') {
      const parent = avatarEl.parentNode;
      const newDiv = document.createElement('div');
      newDiv.id = 'profileAvatar';
      newDiv.className = 'avatar-img avatar-emoji';
      newDiv.innerText = avatar;
      parent.replaceChild(newDiv, avatarEl);
    } else {
      avatarEl.innerText = avatar;
    }
    closeAvatarLibrary();
  }

  function uploadCustomAvatar(event) {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const avatarEl = document.getElementById('profileAvatar');
        const parent = avatarEl.parentNode;
        const img = document.createElement('img');
        img.id = 'profileAvatar';
        img.className = 'avatar-img';
        img.src = e.target.result;
        img.style.objectFit = 'cover';
        parent.replaceChild(img, avatarEl);
        closeAvatarLibrary();
      };
      reader.readAsDataURL(file);
    }
  }

  function openAvatarLibrary() {
    if (!isOwner) {
      alert('只有主人可以更換頭像喔！👑');
      return;
    }
    document.getElementById('avatarLibrary').classList.add('show');
    document.getElementById('overlay').classList.add('show');
  }

  function closeAvatarLibrary() {
    document.getElementById('avatarLibrary').classList.remove('show');
    document.getElementById('overlay').classList.remove('show');
  }

  function handleAvatarClick() {
    openAvatarLibrary();
  }

  function login() {
    const password = document.getElementById('passwordInput').value;
    if (password === OWNER_PASSWORD) {
      isOwner = true;
      updateOwnerUI();
      document.getElementById('passwordInput').value = '';
      showSaveTip('歡迎回來，主人！👑');
    } else {
      alert('密碼錯誤喔～');
    }
  }

  function logout() {
    isOwner = false;
    updateOwnerUI();
    showSaveTip('已退出主人模式');
  }

  function updateOwnerUI() {
    const loginArea = document.getElementById('loginArea');
    const logoutArea = document.getElementById('logoutArea');
    const controlPanel = document.getElementById('controlPanel');
    const crownIcon = document.getElementById('crownIcon');
    const statusText = document.getElementById('loginStatusText');
    const editableElements = document.querySelectorAll('[contenteditable]');
    const textareas = document.querySelectorAll('.editable-text');
    const avatarHint = document.getElementById('avatarHint');

    if (isOwner) {
      loginArea.style.display = 'none';
      logoutArea.style.display = 'block';
      controlPanel.classList.add('show');
      crownIcon.innerText = '👑';
      statusText.innerText = '主人模式 · 可以編輯';
      avatarHint.innerText = '👆 點擊更換頭像';
      
      editableElements.forEach(el => el.contentEditable = 'true');
      textareas.forEach(el => el.readOnly = false);
    } else {
      loginArea.style.display = 'flex';
      logoutArea.style.display = 'none';
      controlPanel.classList.remove('show');
      crownIcon.innerText = '🧸';
      statusText.innerText = '訪客模式 · 歡迎來玩';
      avatarHint.innerText = '🔒 只有主人可更換';
      
      editableElements.forEach(el => el.contentEditable = 'false');
      textareas.forEach(el => el.readOnly = true);
    }
    
    renderCards();
  }

  function renderCards() {
    const grid = document.getElementById('contentGrid');
    grid.innerHTML = '';
    
    // 确保评论数组长度足够
    while (commentsData.length < cardsData.length) {
      commentsData.push([]);
    }
    
    cardsData.forEach((card, index) => {
      const cardDiv = document.createElement('div');
      cardDiv.className = 'pic-card';
      
      const picFrame = document.createElement('div');
      picFrame.className = 'pic-frame';
      if (isOwner) {
        picFrame.style.cursor = 'pointer';
        picFrame.onclick = () => uploadPic(index);
      }
      
      const img = document.createElement('img');
      img.className = 'vintage-pic';
      img.src = card.pic;
      
      const picHint = document.createElement('div');
      picHint.style.cssText = 'text-align:center; font-size:0.7rem; color:#b090a0; margin-top:3px;';
      picHint.innerText = isOwner ? '👆 點擊更換' : '📸';
      
      picFrame.appendChild(img);
      picFrame.appendChild(picHint);
      
      const editableBox = document.createElement('div');
      editableBox.className = 'editable-box';
      
      const textarea = document.createElement('textarea');
      textarea.className = 'editable-text';
      textarea.value = card.text;
      textarea.readOnly = !isOwner;
      textarea.onchange = () => { 
        card.text = textarea.value; 
      };
      
      editableBox.appendChild(textarea);
      
      const commentSection = document.createElement('div');
      commentSection.className = 'comment-section';
      
      const commentList = document.createElement('div');
      commentList.className = 'comment-list';
      
      (commentsData[index] || []).forEach((comment) => {
        const commentItem = document.createElement('div');
        commentItem.className = 'comment-item';
        const isOwnerComment = comment.name === OWNER_NAME || comment.name.includes('👑');
        const replyTo = comment.replyTo ? ` @${comment.replyTo}` : '';
        
        commentItem.innerHTML = `
          <span class="comment-name">
            ${escapeHtml(comment.name)}
            ${isOwnerComment ? '<span class="owner-crown">👑</span>' : ''}
            ：
          </span>
          <span>${escapeHtml(comment.text)}${replyTo}</span>
          <button class="reply-btn" onclick="replyToComment(${index}, '${escapeHtml(comment.name).replace(/'/g, "\\'")}')">💬 回覆</button>
        `;
        commentList.appendChild(commentItem);
      });
      
      const commentInputArea = document.createElement('div');
      commentInputArea.className = 'comment-input-area';
      
      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.className = 'comment-name-input';
      nameInput.placeholder = '名字';
      nameInput.value = isOwner ? OWNER_NAME + '👑' : guestName;
      nameInput.maxLength = 10;
      nameInput.id = `commentName${index}`;
      nameInput.onchange = function() {
        if (!isOwner) {
          guestName = this.value;
          localStorage.setItem('guestName', guestName);
        }
      };
      
      const textInput = document.createElement('input');
      textInput.type = 'text';
      textInput.className = 'comment-text-input';
      textInput.placeholder = '留言...';
      textInput.maxLength = 50;
      textInput.id = `commentText${index}`;
      
      const commentBtn = document.createElement('button');
      commentBtn.className = 'comment-btn';
      commentBtn.innerText = '發送';
      commentBtn.onclick = () => addComment(index);
      
      commentInputArea.appendChild(nameInput);
      commentInputArea.appendChild(textInput);
      commentInputArea.appendChild(commentBtn);
      
      commentSection.appendChild(commentList);
      commentSection.appendChild(commentInputArea);
      
      cardDiv.appendChild(picFrame);
      cardDiv.appendChild(editableBox);
      cardDiv.appendChild(commentSection);
      
      grid.appendChild(cardDiv);
    });
  }

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function uploadPic(index) {
    if (!isOwner) return;
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          cardsData[index].pic = event.target.result;
          renderCards();
        };
        reader.readAsDataURL(file);
      }
    };
    input.click();
  }

  let replyTarget = null;

  function replyToComment(index, targetName) {
    const textInput = document.getElementById(`commentText${index}`);
    if (textInput) {
      textInput.placeholder = `回覆 ${targetName}...`;
      textInput.focus();
      replyTarget = targetName;
    }
  }

  async function addComment(index) {
    const nameInput = document.getElementById(`commentName${index}`);
    const textInput = document.getElementById(`commentText${index}`);
    let name = nameInput.value.trim();
    let text = textInput.value.trim();
    
    if (!name) {
      name = isOwner ? OWNER_NAME : '訪客';
    }
    if (!text) {
      alert('請輸入留言內容～');
      return;
    }
    
    if (isOwner && !name.includes('👑')) {
      name = name + '👑';
    }
    
    const comment = { name, text, time: Date.now() };
    if (replyTarget) {
      comment.replyTo = replyTarget;
      comment.text = text + ` @${replyTarget}`;
      replyTarget = null;
    }
    
    if (!commentsData[index]) commentsData[index] = [];
    commentsData[index].push(comment);
    
    if (commentsData[index].length > 50) {
      commentsData[index].shift();
    }
    
    textInput.value = '';
    textInput.placeholder = '留言...';
    
    renderCards();
    
    // 立即同步评论到云端（所有人都有权限）
    await saveCommentsToCloud();
    showSaveTip('💬 評論已發送！');
  }

  function resetToDefault() {
    if (!isOwner) return;
    if (confirm('確定要恢復默認設置嗎？')) {
      cardsData = JSON.parse(JSON.stringify(defaultCards));
      renderCards();
      saveSiteToCloud();
    }
  }

  function exportConfig() {
    if (!isOwner) return;
    const siteData = collectSiteData();
    siteData.cards = cardsData;
    const data = { siteData, comments: commentsData };
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'my_site_backup.json';
    a.click();
  }

  function importConfig() {
    if (!isOwner) return;
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = async (event) => {
          const data = JSON.parse(event.target.result);
          if (data.siteData) {
            applySiteData(data.siteData);
            if (data.siteData.cards) cardsData = data.siteData.cards;
          }
          if (data.comments) commentsData = data.comments;
          renderCards();
          await saveSiteToCloud();
          await saveCommentsToCloud();
          showSaveTip('備份已導入並同步！');
        };
        reader.readAsText(file);
      }
    };
    input.click();
  }

  function showSaveTip(msg) {
    const indicator = document.getElementById('saveIndicator');
    indicator.innerText = msg;
    setTimeout(() => indicator.innerText = '', 3000);
  }

  window.onload = init;
</script>

</body>
</html>
